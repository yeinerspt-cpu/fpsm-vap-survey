<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - FPSM-VAP 2.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(-135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .login-container h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .login-container p {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: 600;
            color: #2c3e50;
        }

        .form-group input {
            padding: 12px;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        button {
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #229954;
        }

        .admin-panel {
            display: none;
            width: 100%;
            max-width: 1200px;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            margin-bottom: 5px;
            font-size: 28px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .logout-btn {
            background: #e74c3c;
            float: right;
            padding: 10px 20px;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #3498db;
        }

        .stat-card h3 {
            color: #7f8c8d;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50;
        }

        .section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .section h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        .download-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .download-options button {
            flex: 1;
            min-width: 120px;
            background: #3498db;
            font-size: 14px;
        }

        .download-options button:hover {
            background: #2980b9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: #ecf0f1;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #2c3e50;
            border-bottom: 2px solid #bdc3c7;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ecf0f1;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .error {
            background: #ffe8e8;
            color: #c0392b;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #c0392b;
        }

        .success {
            background: #e8f8f5;
            color: #27ae60;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #27ae60;
        }

        .responses-container {
            max-height: 500px;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 20px;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px;
            }

            .download-options {
                flex-direction: column;
            }

            .download-options button {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Login Form -->
    <div id="loginForm" class="login-container">
        <h1>🔒 Panel de Administración</h1>
        <p>FPSM-VAP 2.0</p>
        <div class="form-group">
            <label>Contraseña:</label>
            <input type="password" id="passwordInput" placeholder="Ingresa la contraseña">
        </div>
        <button onclick="login()">Acceder</button>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel">
        <div class="header">
            <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
            <h1>🔐 Panel de Administración</h1>
            <p>FPSM-VAP 2.0 - Gestión de Respuestas</p>
        </div>

        <div id="statsContainer" class="stats">
            <div class="stat-card">
                <h3>Respuestas Totales</h3>
                <div class="value" id="totalResponses">0</div>
            </div>
            <div class="stat-card">
                <h3>Última Respuesta</h3>
                <div class="value" id="lastResponse">-</div>
            </div>
        </div>

        <div class="section">
            <h2>📊 Descargar Datos</h2>
            <div class="download-options">
                <button onclick="downloadCSV()">📄 Descargar CSV</button>
                <button onclick="downloadExcel()">📊 Descargar Excel</button>
                <button onclick="downloadJSON()">📋 Descargar JSON</button>
            </div>
        </div>

        <div class="section">
            <h2>📋 Respuestas Recientes</h2>
            <div id="loadingMessage" class="loading">Cargando datos...</div>
            <div id="errorMessage" class="error" style="display: none;"></div>
            <div class="responses-container">
                <table id="responsesTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>ID Encuesta</th>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Respuestas (Vista Previa)</th>
                        </tr>
                    </thead>
                    <tbody id="responsesBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_PASSWORD = 'admin2025';
        const SUPABASE_URL = 'https://euduchcfmuglmvsfqwwg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_BRBZe_v6udwkv4aIBOBb0w_huMQfECT';

        let allData = [];

        function login() {
            const password = document.getElementById('passwordInput').value;
            if (password === DEFAULT_PASSWORD) {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadData();
            } else {
                alert('Contraseña incorrecta');
            }
        }

        function logout() {
            document.getElementById('loginForm').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('passwordInput').value = '';
            allData = [];
        }

        async function loadData() {
            try {
                document.getElementById('loadingMessage').style.display = 'block';
                document.getElementById('errorMessage').style.display = 'none';

                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/fpsm_vap_responses?select=*&order=created_at.desc`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    }
                );

                if (!response.ok) {
                    throw new Error(`Error: ${response.status}`);
                }

                allData = await response.json();

                document.getElementById('totalResponses').textContent = allData.length;
                if (allData.length > 0) {
                    const lastDate = new Date(allData[0].created_at);
                    document.getElementById('lastResponse').textContent = lastDate.toLocaleDateString('es-ES');
                }

                displayResponses();
                document.getElementById('loadingMessage').style.display = 'none';

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('errorMessage').textContent = 'Error al cargar datos: ' + error.message;
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('loadingMessage').style.display = 'none';
            }
        }

        function displayResponses() {
            const tbody = document.getElementById('responsesBody');
            tbody.innerHTML = '';

            allData.forEach(row => {
                const tr = document.createElement('tr');
                const responsesPreview = JSON.stringify(row.responses).substring(0, 100) + '...';
                tr.innerHTML = `
                    <td>${row.survey_id}</td>
                    <td>${row.survey_date}</td>
                    <td>${row.survey_time}</td>
                    <td><small>${responsesPreview}</small></td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('responsesTable').style.display = 'table';
        }

        function downloadCSV() {
            let csv = 'ID Encuesta,Fecha,Hora,Timestamp,Respuestas\n';
            allData.forEach(row => {
                csv += `"${row.survey_id}","${row.survey_date}","${row.survey_time}","${row.created_at}","${JSON.stringify(row.responses).replace(/"/g, '""')}"\n`;
            });

            downloadFile(csv, 'fpsm-vap-respuestas.csv', 'text/csv');
        }

        function downloadExcel() {
            let html = '<table><tr><th>ID Encuesta</th><th>Fecha</th><th>Hora</th><th>Timestamp</th><th>Respuestas</th></tr>';
            allData.forEach(row => {
                html += `<tr><td>${row.survey_id}</td><td>${row.survey_date}</td><td>${row.survey_time}</td><td>${row.created_at}</td><td>${JSON.stringify(row.responses)}</td></tr>`;
            });
            html += '</table>';

            downloadFile(html, 'fpsm-vap-respuestas.xls', 'application/vnd.ms-excel');
        }

        function downloadJSON() {
            const json = JSON.stringify(allData, null, 2);
            downloadFile(json, 'fpsm-vap-respuestas.json', 'application/json');
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }

        // Auto-load on page load
        window.addEventListener('load', () => {
            document.getElementById('passwordInput').focus();
        });
    </script>
</body>
</html>
